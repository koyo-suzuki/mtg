<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>朝礼・終礼シートシステム</title>
  <?!= include('CSS'); ?>
</head>
<body>
  <div id="app">
    <!-- ローディング -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
    </div>

    <!-- ログイン画面 -->
    <div id="loginScreen" class="container-sm hidden">
      <div class="header text-center">
        <h1>朝礼・終礼シート</h1>
        <div class="header-subtitle">株式会社esplanade</div>
      </div>

      <div class="card mt-20">
        <div class="card-title">ログイン</div>

        <div id="loginAlert" class="alert alert-error hidden"></div>

        <div class="form-group">
          <label class="required">ロールを選択</label>
          <select id="roleSelect" class="form-control">
            <option value="">選択してください</option>
            <option value="manager">店責</option>
            <option value="cast">キャスト</option>
            <option value="admin">管理者（本部）</option>
          </select>
        </div>

        <div class="form-group" id="storeGroup" style="display: none;">
          <label class="required">店舗を選択</label>
          <select id="storeSelect" class="form-control">
            <option value="">選択してください</option>
          </select>
        </div>

        <div class="form-group">
          <label class="required">パスワード</label>
          <input type="password" id="passwordInput" class="form-control" placeholder="パスワードを入力">
        </div>

        <button id="loginButton" class="btn btn-primary btn-block">ログイン</button>
      </div>
    </div>

    <!-- 店責用画面 -->
    <div id="managerScreen" class="container hidden">
      <div class="header">
        <div class="row">
          <div class="col">
            <h1>店責用画面</h1>
          </div>
          <div class="col text-right">
            <span id="managerStoreName"></span>
            <button id="managerLogoutButton" class="btn btn-sm btn-outline" style="margin-left: 10px;">ログアウト</button>
          </div>
        </div>
      </div>

      <div class="current-date text-center">
        営業日: <span id="managerBusinessDate"></span>
      </div>

      <!-- タブ -->
      <div class="tabs">
        <div class="tab active" data-tab="chorei">朝礼入力</div>
        <div class="tab" data-tab="shurei">終礼入力</div>
        <div class="tab" data-tab="issues">課題管理</div>
      </div>

      <!-- 朝礼タブ -->
      <div id="choreiTab" class="tab-content active">
        <div class="card">
          <div class="card-title">朝礼入力</div>

          <div id="choreiAlert" class="alert alert-success hidden"></div>

          <div class="form-group">
            <label>店舗ニュース</label>
            <textarea id="storeNewsInput" class="form-control" placeholder="店舗全体のお知らせを入力（全体ニュースはNotionを参照）"></textarea>
          </div>

          <div class="form-group">
            <label>個人ニュース</label>
            <textarea id="personalNewsInput" class="form-control" placeholder="個人宛てのお知らせを入力"></textarea>
          </div>

          <div class="mb-20">
            <div class="row" style="align-items: center; justify-content: space-between;">
              <h3>キャスト一覧</h3>
              <button id="addCastButton" class="btn btn-sm btn-secondary">+ キャスト追加</button>
            </div>
          </div>

          <div id="castList"></div>

          <button id="saveChoreiButton" class="btn btn-primary btn-block mt-20">保存</button>
        </div>
      </div>

      <!-- 終礼タブ -->
      <div id="shureiTab" class="tab-content">
        <div class="card">
          <div class="card-title">終礼入力</div>

          <div id="shureiAlert" class="alert alert-success hidden"></div>

          <div class="form-group">
            <label>店舗全体売上</label>
            <input type="number" id="totalSalesInput" class="form-control" placeholder="0">
          </div>

          <div class="mb-20">
            <h3>キャスト実績入力</h3>
            <p class="text-light" style="font-size: 0.875rem;">Airegiを目視確認してから入力してください</p>
          </div>

          <div id="shureiCastList"></div>

          <button id="saveShureiButton" class="btn btn-primary btn-block mt-20">保存</button>
        </div>

        <!-- 課題追加 -->
        <div class="card">
          <div class="card-title">課題・要望を追加</div>

          <div class="form-group">
            <label class="required">内容</label>
            <textarea id="issueContentInput" class="form-control" placeholder="課題や要望の内容を入力"></textarea>
          </div>

          <div class="form-group">
            <label class="required">起票者</label>
            <input type="text" id="issueReporterInput" class="form-control" placeholder="起票者名を入力">
          </div>

          <button id="addIssueButton" class="btn btn-accent">課題を追加</button>
        </div>
      </div>

      <!-- 課題管理タブ -->
      <div id="issuesTab" class="tab-content">
        <div class="card">
          <div class="card-title">課題トラッカー</div>

          <div id="issuesAlert" class="alert alert-success hidden"></div>

          <div class="tabs">
            <div class="tab active" data-issue-tab="all">全て</div>
            <div class="tab" data-issue-tab="未対応">未対応</div>
            <div class="tab" data-issue-tab="対応中">対応中</div>
            <div class="tab" data-issue-tab="完了">完了</div>
          </div>

          <div id="issuesList"></div>
        </div>
      </div>
    </div>

    <!-- キャスト用画面 -->
    <div id="castScreen" class="container-sm hidden">
      <div class="header">
        <div class="row">
          <div class="col">
            <h1>キャスト用画面</h1>
          </div>
          <div class="col text-right">
            <button id="castLogoutButton" class="btn btn-sm btn-outline">ログアウト</button>
          </div>
        </div>
      </div>

      <div class="store-info">
        <div class="store-info-name" id="castStoreName"></div>
      </div>

      <div class="current-date text-center">
        営業日: <span id="castBusinessDate"></span>
      </div>

      <!-- タブ -->
      <div class="tabs">
        <div class="tab active" data-tab="goal">目標入力</div>
        <div class="tab" data-tab="performance">実績閲覧</div>
      </div>

      <!-- 目標入力タブ -->
      <div id="goalTab" class="tab-content active">
        <div class="card">
          <div class="card-title">本日の目標</div>

          <div id="goalAlert" class="alert alert-success hidden"></div>

          <div class="form-group">
            <label class="required">キャスト名</label>
            <input type="text" id="castNameInput" class="form-control" placeholder="名前を入力">
          </div>

          <div class="form-group">
            <label class="required">目標</label>
            <textarea id="goalInput" class="form-control" placeholder="本日の目標を入力"></textarea>
          </div>

          <button id="saveGoalButton" class="btn btn-primary btn-block">保存</button>
        </div>
      </div>

      <!-- 実績閲覧タブ -->
      <div id="performanceTab" class="tab-content">
        <div class="card">
          <div class="card-title">実績閲覧</div>

          <div id="performanceLoading" class="loading hidden">
            <div class="spinner"></div>
          </div>

          <div id="performanceContent">
            <div class="form-group">
              <label class="required">キャスト名</label>
              <input type="text" id="performanceCastNameInput" class="form-control" placeholder="名前を入力">
            </div>

            <button id="loadPerformanceButton" class="btn btn-primary btn-block">実績を表示</button>

            <div id="performanceResult" class="mt-20"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 管理者用ダッシュボード -->
    <div id="adminScreen" class="container hidden">
      <div class="header">
        <div class="row">
          <div class="col">
            <h1>管理者用ダッシュボード</h1>
          </div>
          <div class="col text-right">
            <button id="adminLogoutButton" class="btn btn-sm btn-outline">ログアウト</button>
          </div>
        </div>
      </div>

      <div class="current-date text-center">
        営業日: <span id="adminBusinessDate"></span>
      </div>

      <!-- タブ -->
      <div class="tabs">
        <div class="tab active" data-tab="dashboard">全店舗概況</div>
        <div class="tab" data-tab="adminIssues">課題管理</div>
        <div class="tab" data-tab="summary">月間集計</div>
      </div>

      <!-- 全店舗概況タブ -->
      <div id="dashboardTab" class="tab-content active">
        <div class="card">
          <div class="card-title">全店舗概況</div>

          <div id="dashboardLoading" class="loading">
            <div class="spinner"></div>
          </div>

          <div id="dashboardContent"></div>
        </div>
      </div>

      <!-- 課題管理タブ -->
      <div id="adminIssuesTab" class="tab-content">
        <div class="card">
          <div class="card-title">課題トラッカー</div>

          <div class="tabs">
            <div class="tab active" data-admin-issue-tab="all">全て</div>
            <div class="tab" data-admin-issue-tab="未対応">未対応</div>
            <div class="tab" data-admin-issue-tab="対応中">対応中</div>
            <div class="tab" data-admin-issue-tab="完了">完了</div>
          </div>

          <div id="adminIssuesList"></div>
        </div>
      </div>

      <!-- 月間集計タブ -->
      <div id="summaryTab" class="tab-content">
        <div class="card">
          <div class="card-title">月間集計</div>

          <div class="form-group">
            <label>店舗</label>
            <select id="summaryStoreSelect" class="form-control">
              <option value="">全店舗</option>
            </select>
          </div>

          <button id="loadSummaryButton" class="btn btn-primary">集計を表示</button>

          <div id="summaryResult" class="mt-20"></div>
        </div>
      </div>
    </div>
  </div>

  <?!= include('JavaScript'); ?>
</body>
</html>
